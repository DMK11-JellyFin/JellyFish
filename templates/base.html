<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>🪼 Jellyfish</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Arial', sans-serif; background: #0a0a1a; color: #eee; min-height: 100vh; }

        /* FOND CIRCUIT */
        canvas { position: fixed; top: 0; left: 0; z-index: 0; pointer-events: none; }
        nav, .container { position: relative; z-index: 1; }

        /* NAVBAR */
        nav { background: rgba(18,18,42,0.95); padding: 15px 40px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #7b2ff7; backdrop-filter: blur(5px); }
        nav h1 { font-size: 24px; color: #7b2ff7; }
        nav a { color: #ccc; text-decoration: none; margin-left: 20px; font-size: 15px; transition: color 0.2s; }
        nav a:hover { color: #7b2ff7; }

        /* CONTENU */
        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }

        /* CARTES STATISTIQUES */
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 35px; }
        .stat-card { background: rgba(18,18,42,0.85); border-radius: 12px; padding: 20px; text-align: center; border: 1px solid #2a2a4a; transition: transform 0.2s; backdrop-filter: blur(5px); }
        .stat-card:hover { transform: translateY(-4px); }
        .stat-card .nombre { font-size: 36px; font-weight: bold; color: #7b2ff7; }
        .stat-card .label { font-size: 13px; color: #888; margin-top: 5px; }
        .stat-card.free .nombre { color: #4caf50; }
        .stat-card.normal .nombre { color: #2196F3; }
        .stat-card.vip .nombre { color: #f7c72f; }

        /* BARRE DE RECHERCHE */
        .recherche-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .recherche-bar input { flex: 1; padding: 10px 15px; border-radius: 8px; border: 1px solid #2a2a4a; background: rgba(18,18,42,0.85); color: white; font-size: 15px; }
        .recherche-bar button { background: #7b2ff7; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 15px; }
        .recherche-bar button:hover { background: #6020d0; }

        /* TABLEAU */
        table { width: 100%; border-collapse: collapse; background: rgba(18,18,42,0.85); border-radius: 12px; overflow: hidden; backdrop-filter: blur(5px); }
        th { background: #7b2ff7; padding: 14px; text-align: left; font-size: 14px; }
        td { padding: 14px; border-bottom: 1px solid #1e1e3a; font-size: 14px; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(26,26,53,0.9); transition: background 0.2s; }

        /* BADGES ABONNEMENT */
        .badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .badge.Free { background: #1a3a1a; color: #4caf50; }
        .badge.Normal { background: #1a3a5c; color: #2196F3; }
        .badge.VIP { background: #3a2a00; color: #f7c72f; }

        /* BOUTON SUPPRIMER */
        .btn-supprimer { color: #e53935; text-decoration: none; font-size: 18px; transition: transform 0.2s; display: inline-block; }
        .btn-supprimer:hover { transform: scale(1.3); }

        /* FORMULAIRE */
        .form-card { background: rgba(18,18,42,0.85); border-radius: 12px; padding: 30px; border: 1px solid #2a2a4a; backdrop-filter: blur(5px); }
        .form-card h2 { margin-bottom: 20px; color: #7b2ff7; }
        .form-card input, .form-card select { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #2a2a4a; background: #0a0a1a; color: white; font-size: 15px; }
        .form-card button { background: #7b2ff7; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-size: 15px; width: 100%; }
        .form-card button:hover { background: #6020d0; }

        /* MESSAGE VIDE */
        .vide { text-align: center; padding: 50px; color: #555; font-size: 18px; }
    </style>
</head>
<body>
    <canvas id="circuit"></canvas>
    <script>
        const canvas = document.getElementById('circuit');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initNodes();
        });

        let nodes = [];
        const NODE_COUNT = 60;
        const MAX_DIST = 150;

        function initNodes() {
            nodes = [];
            for (let i = 0; i < NODE_COUNT; i++) {
                nodes.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.4,
                    vy: (Math.random() - 0.5) * 0.4
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            nodes.forEach(n => {
                n.x += n.vx;
                n.y += n.vy;
                if (n.x < 0 || n.x > canvas.width) n.vx *= -1;
                if (n.y < 0 || n.y > canvas.height) n.vy *= -1;

                ctx.beginPath();
                ctx.arc(n.x, n.y, 2, 0, Math.PI * 2);
                ctx.fillStyle = '#7b2ff7';
                ctx.fill();
            });

            for (let i = 0; i < nodes.length; i++) {
                for (let j = i + 1; j < nodes.length; j++) {
                    const dx = nodes[i].x - nodes[j].x;
                    const dy = nodes[i].y - nodes[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < MAX_DIST) {
                        ctx.beginPath();
                        ctx.moveTo(nodes[i].x, nodes[i].y);
                        ctx.lineTo(nodes[j].x, nodes[j].y);
                        ctx.strokeStyle = `rgba(123, 47, 247, ${1 - dist / MAX_DIST})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(draw);
        }

        initNodes();
        draw();
    </script>

    <nav>
        <h1>JellyFish</h1>
        <div>
            <a href="/utilisateurs">👥 Utilisateurs</a>
            <a href="/ajouter">➕ Ajouter</a>
        </div>
    </nav>
    <div class="container">
        {% block contenu %}{% endblock %}
    </div>
</body>
</html>
