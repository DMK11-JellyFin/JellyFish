function shuffle(arr) {
    return [...arr].sort(() => Math.random() - 0.5);
}

function afficher(data, containerId) {
    const container = document.getElementById(containerId);
    container.style.opacity = '0';
    container.style.transition = 'opacity 0.5s';
    setTimeout(() => {
        container.innerHTML = '';
        shuffle(data).slice(0, 5).forEach(item => {
            container.innerHTML += `
                <div class="affiche-card">
                    <img src="${item.img}" alt="${item.titre}" onerror="this.src='https://via.placeholder.com/140x200/12122a/7b2ff7?text='">
                    <p>${item.titre}</p>
                </div>`;
        });
        container.style.opacity = '1';
    }, 500);
}

function rafraichir() {
    afficher(films, 'films-container');
    afficher(series, 'series-container');
    afficher(animes, 'animes-container');
}
